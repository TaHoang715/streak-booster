name: Auto Streak & Activity Booster

on:
  schedule:
    # Chạy mỗi ngày lúc 11:30 UTC (tức 18:30 tối giờ Việt Nam)
    - cron: '30 11 * * *'
  workflow_dispatch: # Cho phép kích hoạt chạy thử thủ công từ giao diện GitHub Actions

permissions:
  contents: write
  issues: write
  pull-requests: write

jobs:
  boost:
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - name: Checkout mã nguồn
        uses: actions/checkout@v3
        with:
          fetch-depth: 0

      # 1. Tạo Commit tự động trên nhánh main để giữ chuỗi đóng góp (Streak)
      - name: Tạo Commit giữ Streak
        run: |
          git config --global user.name "TaHoang715"
          git config --global user.email "taminhhoang.nk@gmail.com"
          
          # Ghi nhận hoạt động vào file log
          echo "Auto update streak: $(date)" >> history.txt
          git add history.txt
          git commit -m "chore: cập nhật tài liệu và tối ưu hóa hệ thống định kỳ [skip ci]" || echo "Không có thay đổi"
          git push origin main

      # 2. Tạo 1 Pull Request hàng ngày và tự động Merge
      - name: Tạo 1 Pull Request và tự động Merge
        run: |
          git config --global user.name "TaHoang715"
          git config --global user.email "taminhhoang.nk@gmail.com"
          
          git checkout main
          git pull origin main
          
          # Tạo tên nhánh con ngẫu nhiên
          BRANCH_NAME="daily-patch-$(date +%s)"
          git checkout -b $BRANCH_NAME
          
          # Thay đổi nhỏ trên file patch.txt
          echo "Tối ưu hóa mã nguồn hàng ngày vào lúc $(date)" >> patch.txt
          git add patch.txt
          git commit -m "fix: bảo trì giao diện hàng ngày [skip ci]"
          
          # Đẩy nhánh lên remote
          git push origin $BRANCH_NAME
          
          # Mở Pull Request bằng GitHub CLI
          PR_URL=$(gh pr create \
            --title "fix: tối ưu hiệu suất tải trang định kỳ hàng ngày" \
            --body "Tự động kiểm tra cấu trúc code hàng ngày để duy trì chất lượng." \
            --head $BRANCH_NAME \
            --base main)
          
          echo "Đã tạo PR: $PR_URL"
          
          # Merge PR bằng URL chính xác
          gh pr merge "$PR_URL" --merge --delete-branch || true
          
          # Trở lại nhánh main, dọn dẹp và đồng bộ lại
          git checkout main || true
          git branch -D $BRANCH_NAME || true
          git pull origin main || true

      # 3. Tạo 1 Issue hàng ngày và tự động Đóng
      - name: Tạo 1 Issue và tự động Đóng
        run: |
          # Tạo Issue
          ISSUE_URL=$(gh issue create \
            --title "bug: tối ưu hóa tài nguyên hệ thống định kỳ" \
            --body "Phát hiện tài nguyên tải trang chưa tối ưu. Cần cấu trúc lại CSS.")
          
          echo "Đã tạo Issue: $ISSUE_URL"
          
          # Lấy số hiệu Issue
          ISSUE_NUM=$(echo $ISSUE_URL | grep -oE '[0-9]+$')
          
          # Đóng Issue kèm comment
          gh issue close $ISSUE_NUM --comment "Lỗi đã được khắc phục tự động trong chu kỳ bảo trì hàng ngày."
