name: Visitor Counter Booster

on:
  workflow_dispatch: # Allows manual trigger from the Actions tab

permissions:
  contents: write

jobs:
  boost-views:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 18

      - name: Install dependencies
        run: |
          npm init -y
          npm install playwright

      - name: Install Playwright Chromium Browser
        run: npx playwright install chromium

      - name: Run visitor count booster
        run: node boost-views.js

      - name: Self-destruct and cleanup
        run: |
          git config --global user.name "TaHoang715"
          git config --global user.email "taminhhoang.nk@gmail.com"
          git rm boost-views.js .github/workflows/visitor-booster.yml
          git commit -m "chore: cleanup temporary booster files after successful run [skip ci]"
          git push origin main
